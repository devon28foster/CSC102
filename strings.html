        <form id="myForm">
            <!--label so user knows what to input in text box for first name-->
            <label for="firstname">First name:</label>
            <br>
            <!--text box for first name-->
            <input type="text" id="firstname" name="firstname">
            <br>
            <!-- label so user knows what to input in text box for last name-->
            <label for="lastname">Last name:</label>
            <br>
            <!--text box for last name-->
            <input type="text" id="lastname" name="lastname">
            <br>
            <!--label so user knows what to input in text box for zip-->
            <label for="zipcode">Zip Code:</label>
            <br>
            <!--text box for zip code-->
            <input type="text" id="zipcode" name="zipcode">
            <br>
            <!--button to submit the form-->
            <input type="button" value="Submit"> 
            </label>

        </form>

        <!--form submits and calls checkPalindrome-->
        <form id="palForm" onsubmit="checkPalindrome(event);">
            <!--label so user knows what to input in text box for word to check if palindrome-->
            <label for="palindrome">Enter a word to check if it's a palindrome:</label>
            <br>
            <!--text box for word to check if palindrome-->
            <input type="text" id="palindrome" name="palindrome">
            <br>
            <!--button to submit the form-->
            <input type="button" value="Check">
        </form>

        <!--display result of palindrome check-->
        <div id="palindromeResult"></div>


        <!--form to reset and allow try again button-->
        <form id="resetForm" onsubmit="resetPalindrome(event);">
        <input type="submit" id="tryAgainButton" value="Try Another word?" style="display:none;">
        </form>

        <!--audio element for drone sound on strings.html-->
        <audio id="droneSound" src="DroneSound.mp3" style="display:none;">
        </audio>
